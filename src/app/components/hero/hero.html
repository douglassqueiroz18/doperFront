<section class="hero-container">
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="hero-content">
    <div class="hero-text">
      <span class="badge shimmer">Inovação & Futuro</span>
      
      <h1>Transformando ideias em <span class="highlight">código de elite.</span></h1>
      
      <p>
        Explore as últimas fronteiras da tecnologia com soluções escaláveis, 
        design intuitivo e performance de alto nível.
      </p>
      
      <div class="hero-actions">
        <button mat-flat-button class="main-btn">
          Começar Agora
          <mat-icon>arrow_right_alt</mat-icon>
        </button>
        <button mat-stroked-button class="secondary-btn">
          Ver Portfólio
        </button>
      </div>
    </div>

    <div class="hero-visual">
      <div class="tech-card glass-effect">
        <div class="card-header">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
        </div>
        <mat-icon class="floating-icon">terminal</mat-icon>
        <div class="code-snippet">
          <span class="keyword">const</span> <span class="variable">future</span> = <span class="string">"ready"</span>;
        </div>
      </div>
    </div>
  </div>
</section>
